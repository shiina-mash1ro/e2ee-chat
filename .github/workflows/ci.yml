name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: server/go.mod

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Test server
        working-directory: server
        run: go test -v -timeout 20s ./...

      - name: Install Playwright browser
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Start server
        working-directory: server
        run: |
          ADDR=127.0.0.1:8080 POW_DIFFICULTY=8 go run . > ../server.log 2>&1 &
          echo $! > ../server.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ../server.log
          exit 1

      - name: Smoke test chat
        working-directory: ui
        env:
          BASE_URL: http://127.0.0.1:8080
        run: npm run smoke

      - name: Show server log on failure
        if: failure()
        run: cat server.log || true
